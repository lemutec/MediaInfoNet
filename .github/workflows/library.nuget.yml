name: pack

on:
  release:
    types: [created]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore ./pack/MediaInfoDLL.csproj

      - name: Build
        run: dotnet build ./pack/MediaInfoDLL.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ./pack/MediaInfoDLL.csproj -c Release --no-build -o ../

      - name: Push NuGet package
        # run:  dotnet nuget push "out\*.nupkg" -k ${{secrets.NUGET_AUTH_TOKEN}} --source https://api.nuget.org/v3/index.json
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./*.nupkg
